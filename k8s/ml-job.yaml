apiVersion: batch/v1
kind: Job
metadata:
  name: ml-pipeline-check
spec:
  template:
    spec:
      containers:
      - name: ml-worker
        image: ml-workload:v1
        imagePullPolicy: Never  # Use the local image loaded into minikube
        # CRITICAL FIX: Explicitly call the python interpreter
        command: ["python"]
        # The path to your script inside the container's /app directory
        args: ["src/train_rf.py"]
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
      restartPolicy: Never
  # Prevents multiple "failed" pods from cluttering your dashboard
  backoffLimit: 0