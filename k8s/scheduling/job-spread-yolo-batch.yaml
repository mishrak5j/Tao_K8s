# Spread + YOLO — Minikube (make build + make load). Same shape as job-scheduler-binpack-yolo but spread-scheduler.
# Requires: make install-secondary-scheduler and second-scheduler-spread Running in kube-system.
apiVersion: batch/v1
kind: Job
metadata:
  name: ml-sched-spread-yolo
  namespace: ml-scheduling
spec:
  completions: 4
  parallelism: 2
  template:
    spec:
      schedulerName: spread-scheduler
      containers:
        - name: ml-worker
          image: ml-workload:v1
          imagePullPolicy: Never
          args: ["--task", "yolo"]
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
      restartPolicy: Never
  backoffLimit: 0
