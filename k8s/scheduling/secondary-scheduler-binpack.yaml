# Bin-pack profile only (MostAllocated). Pairs with job-scheduler-binpack.yaml (schedulerName: binpack-scheduler).
apiVersion: v1
kind: ConfigMap
metadata:
  name: second-scheduler-binpack-config
  namespace: kube-system
data:
  config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    # Required: config defaults leaderElect=true; without this, secondary schedulers
    # compete with the default kube-scheduler for the same lease and crash.
    leaderElection:
      leaderElect: false
    profiles:
      - schedulerName: binpack-scheduler
        pluginConfig:
          - name: NodeResourcesFit
            args:
              scoringStrategy:
                type: MostAllocated
                resources:
                  - name: cpu
                    weight: 1
                  - name: memory
                    weight: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: second-scheduler-binpack
  namespace: kube-system
  labels:
    app: second-scheduler-binpack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: second-scheduler-binpack
  template:
    metadata:
      labels:
        app: second-scheduler-binpack
    spec:
      serviceAccountName: second-scheduler
      containers:
        - name: kube-scheduler
          # Must match cluster control plane minor version (see k8s/scheduling/README.md).
          image: registry.k8s.io/kube-scheduler:v1.35.0
          imagePullPolicy: IfNotPresent
          # Image ENTRYPOINT is /go-runner; args alone are passed to go-runner (not kube-scheduler).
          command:
            - /usr/local/bin/kube-scheduler
          args:
            - --config=/etc/kubernetes/scheduler-config.yaml
            - --leader-elect=false
          volumeMounts:
            - name: config
              mountPath: /etc/kubernetes/scheduler-config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: second-scheduler-binpack-config
