# ServiceAccount + bind to built-in kube-scheduler ClusterRole (second scheduler instance).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: second-scheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: second-scheduler-as-kube-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-scheduler
subjects:
  - kind: ServiceAccount
    name: second-scheduler
    namespace: kube-system
